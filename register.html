<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整備士スキル登録</title>

  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      padding: 40px;
    }

    h1 {
      text-align: center;
    }

    .form-container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #357abd;
    }

    #message {
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
    
.checkbox-group {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px 20px;
  margin-top: 8px;
}

.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;   /* ★ 日本語を改行させない */
}

.checkbox-item span {
  white-space: nowrap;   /* ★ 文字が縦に割れるのを防止 */
}

.checkbox-item input[type="checkbox"] {
  margin: 0;
}

/* ===== チェックボックス用（最終調整） ===== */

.checkbox-group {
  display: grid;
  gap: 10px 24px;
  margin-top: 8px;
}

/* 左寄せ & 日本語が縦に割れない設定 */
.checkbox-group-left {
  grid-template-columns: repeat(auto-fill, minmax(200px, max-content));
  justify-content: start;
  justify-items: start;
}

.checkbox-item {
  display: inline-flex;
  align-items: center;
  column-gap: 8px;
  white-space: nowrap; /* 日本語改行防止 */
  cursor: pointer;
}

.checkbox-item span {
  white-space: nowrap; /* 念のため */
}

.checkbox-item input[type="checkbox"] {
  margin: 0;
}
  </style>
</head>

<body>

<h1>整備士スキル登録</h1>

<div class="form-container">

  <div id="message"></div>

  <form id="skillForm">
    <div class="form-group">
      <label for="name">名前</label>
      <input type="text" id="name">
    </div>

<div class="form-group">
  <label>対応メーカー（複数選択可）</label>

  <div class="checkbox-group checkbox-group-left">
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="トヨタ">
      <span>トヨタ</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="日産">
      <span>日産</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="ホンダ">
      <span>ホンダ</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="マツダ">
      <span>マツダ</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="スバル">
      <span>スバル</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="スズキ">
      <span>スズキ</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="ダイハツ">
      <span>ダイハツ</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="maker" value="その他">
      <span>その他</span>
    </label>
  </div>
</div>

<div class="form-group">
  <label>資格（複数選択可）</label>

  <div class="checkbox-group checkbox-group-left">
    <label class="checkbox-item">
      <input type="checkbox" name="license" value="1級整備士">
      <span>1級整備士</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="license" value="2級整備士">
      <span>2級整備士</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="license" value="3級整備士">
      <span>3級整備士</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="license" value="車体整備士">
      <span>車体整備士</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="license" value="検査員">
      <span>検査員</span>
    </label>
    <label class="checkbox-item">
      <input type="checkbox" name="license" value="なし">
      <span>なし</span>
    </label>
  </div>
</div>


    <div class="form-group">
      <label for="experience">経験年数</label>
      <input type="number" id="experience">
    </div>

<div class="form-group">
  <label for="phone">電話番号 <span style="color:red">*</span></label>
  <input type="tel" id="phone" placeholder="09012345678">
</div>

<div class="form-group">
  <label for="email">メールアドレス <span style="color:red">*</span></label>
  <input type="email" id="email" placeholder="example@example.com">
</div>


    <button type="submit" id="submitBtn">登録</button>
  </form>

</div>


<script>
function getCheckedValues(name) {
  return Array.from(
    document.querySelectorAll(`input[name="${name}"]:checked`)
  ).map(cb => cb.value).join(",");
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbzsq6z295DQwLoei5M_EfbDtW2NExWsVvwGTKIE6MgcAXYhRsxmDLvN4I47hlrzyXKp/exec";

document.getElementById("skillForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const maker = getCheckedValues("maker");
  const carType = document.getElementById("carType").value.trim();
  const license = getCheckedValues("license");
  const experience = document.getElementById("experience").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();

  /* ===== 入力チェック ===== */

  // 必須チェック
  if (!name || !maker || !license || !experience || !phone || !email) {
    alert("必須項目が未入力です");
    return;
  }

  // 名前の文字数
  if (name.length > 30) {
    alert("名前は30文字以内で入力してください");
    return;
  }

  // 経験年数（数字・範囲）
  if (!/^\d+$/.test(experience) || experience > 99) {
    alert("経験年数は0〜99の数字で入力してください");
    return;
  }

  // 電話番号（10〜11桁）
  if (!/^\d{10,11}$/.test(phone)) {
    alert("電話番号は10〜11桁の数字で入力してください");
    return;
  }

  // メール形式チェック
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert("メールアドレスの形式が正しくありません");
    return;
  }

  /* ===== データ送信 ===== */
  const data = {
    name,
    maker,
    carType,
    license,
    experience,
    phone,
    email
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("登録が完了しました");
    document.getElementById("skillForm").reset();
  })
  .catch(() => {
    alert("登録に失敗しました");
  });
});
</script>

function getCheckedValues(name) {
  return Array.from(
    document.querySelectorAll(`input[name="${name}"]:checked`)
  ).map(cb => cb.value).join(",");
}

</script>

</body>
</html>

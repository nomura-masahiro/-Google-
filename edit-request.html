<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>登録情報の修正</title>
</head>
<body>

<h2>登録情報の修正</h2>

<p>
登録時のメールアドレスを入力してください。<br>
修正用リンクをお送りします。
</p>

<input type="email" id="email">
<button id="sendBtn">編集リンク送信</button>

<script>
const GAS_URL = "あなたのGASのexec URL";

document.getElementById("sendBtn").onclick = () => {
  const email = document.getElementById("email").value;
  if (!email) {
    alert("メールアドレスを入力してください");
    return;
  }

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: "sendEditLink",
      email
    })
  })
  .then(() => alert("メールを送信しました"))
  .catch(() => alert("送信に失敗しました"));
};
</script>

</body>
</html>
